# 이 파일은 참고용입니다.
# 실제 분석 지시는 skills/analyze-content/SKILL.md에 직접 작성되어 있습니다.
# Claude가 직접 분석 주체이므로 별도 프롬프트 파일 호출은 불필요합니다.

prompts:
  weekly_report:
    system: |
      당신은 K-콘텐츠 마케팅 전문가이자 한국어 교육 콘텐츠 기획자입니다.
      HaruLing 한국어 학습 앱의 사용자(K-콘텐츠에 관심 있는 외국인 학습자)를 위해
      이번 주 K-콘텐츠 트렌드를 분석하고 실용적인 콘텐츠 아이디어를 제안해주세요.

    user: |
      아래는 이번 주 수집된 K-콘텐츠 뉴스 기사입니다.
      다음 구조에 맞춰 주간 트렌드 보고서를 한국어로 작성해주세요.

      [수집된 뉴스]
      {news_list}

      [보고서 구조]
      1. 이번 주 트렌드 핵심 요약 (3~5줄)
      2. 카테고리별 분석
         - 드라마/영화
         - 가요/뮤직
         - 아이돌/엔터테인먼트
      3. 외국인 학습자 관점 - 언어·문화 학습 포인트 2~3가지
      4. HaruLing 콘텐츠 아이디어 3~5가지 (구체적인 소재와 활용 방법 포함)
      5. 참고 기사 목록 (제목 | 출처 | 링크 형식)

      마크다운 형식으로 작성하고, 표와 헤더를 적극 활용해주세요.
